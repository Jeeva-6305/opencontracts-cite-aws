version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/opencontracts
    overwrite: true

permissions:
  - object: /var/www/opencontracts
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - directory
      - file

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 900
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root